<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>台灣股票預測分析</title>
<script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial, sans-serif; background: #0f1117; color: #e0e0e0; font-size: 16px; }
.header { background: #1a1d27; padding: 18px 40px; border-bottom: 1px solid #2d3048; display: flex; align-items: center; gap: 20px; }
.header h1 { font-size: 24px; color: #00d4ff; flex: 1; }
.tabs { display: flex; gap: 8px; flex-wrap: wrap; }
.tab { padding: 10px 20px; border-radius: 6px; cursor: pointer; font-size: 15px; background: #2d3048; color: #aaa; border: none; }
.tab.active { background: #00d4ff; color: #000; font-weight: bold; }
.container { max-width: 1300px; margin: 24px auto; padding: 0 20px; }
.page { display: none; }
.page.active { display: block; }
.search-bar { display: flex; gap: 12px; margin-bottom: 24px; }
.search-bar input { flex: 1; padding: 14px 18px; border-radius: 8px; border: 1px solid #2d3048; background: #1a1d27; color: #fff; font-size: 18px; }
.search-bar button { padding: 14px 32px; border-radius: 8px; border: none; background: #00d4ff; color: #000; font-size: 17px; font-weight: bold; cursor: pointer; }
.search-bar button:hover { background: #00b8d9; }
.summary { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 20px; }
.card { background: #1a1d27; border-radius: 10px; padding: 20px; border: 1px solid #2d3048; text-align: center; }
.card .label { font-size: 15px; color: #888; margin-bottom: 8px; }
.card .value { font-size: 32px; font-weight: bold; color: #00d4ff; }
.card .value.up { color: #00e676; }
.card .value.down { color: #ff5252; }
.card .value.neutral { color: #ffd54f; }
.chart-box { background: #1a1d27; border-radius: 10px; padding: 20px; margin-bottom: 18px; border: 1px solid #2d3048; }
.chart-box h3 { margin-bottom: 14px; color: #aaa; font-size: 16px; }
.loading { text-align: center; padding: 50px; color: #888; font-size: 18px; display: none; }
.error { background: #2a1a1a; border: 1px solid #ff5252; border-radius: 8px; padding: 16px; color: #ff5252; margin-bottom: 18px; display: none; }
#singleResults { display: none; }

/* Favorites */
.fav-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; flex-wrap: wrap; gap: 10px; }
.fav-header h2 { font-size: 22px; color: #fff; }
.btn-predict { padding: 12px 22px; border-radius: 8px; border: none; background: #00e676; color: #000; font-size: 15px; font-weight: bold; cursor: pointer; }
.btn-predict:hover { background: #00c853; }
.btn-predict:disabled { background: #333; color: #666; cursor: not-allowed; }
.fav-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 28px; }
.fav-card { background: #1a1d27; border-radius: 10px; padding: 16px; border: 1px solid #2d3048; position: relative; }
.fav-card .sname { font-size: 16px; font-weight: bold; color: #fff; margin-bottom: 2px; }
.fav-card .sid { font-size: 12px; color: #555; margin-bottom: 10px; }
.fav-card .price-row { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 6px; }
.fav-card .pred { font-weight: bold; }
.fav-card .pred.up { color: #00e676; }
.fav-card .pred.down { color: #ff5252; }
.fav-card .pred.pending { color: #888; }
.winbadge { margin-top: 6px; font-size: 12px; padding: 3px 8px; border-radius: 4px; display: inline-block; }
.winbadge.good { background: #1a3a2a; color: #00e676; }
.winbadge.bad { background: #3a1a1a; color: #ff5252; }
.winbadge.neutral { background: #2a2a2a; color: #aaa; }
.sentiment-badge { font-size: 12px; padding: 2px 7px; border-radius: 4px; display: inline-block; margin-top: 4px; }
.sentiment-badge.pos { background: #1a3a2a; color: #00e676; }
.sentiment-badge.neg { background: #3a1a1a; color: #ff5252; }
.sentiment-badge.neu { background: #2a2a2a; color: #aaa; }
.stop-badge { font-size: 11px; padding: 2px 6px; border-radius: 4px; display: inline-block; margin-top: 4px; background: #2a1a3a; color: #ce93d8; }
.fav-card .del-btn { margin-top: 10px; width: 100%; padding: 5px; border-radius: 5px; border: 1px solid #ff5252; background: transparent; color: #ff5252; font-size: 12px; cursor: pointer; display: none; }
.fav-card .del-btn:hover { background: #3a1a1a; }
.edit-mode .fav-card .del-btn { display: block; }
.edit-mode .fav-card { border-color: #ff5252; }
.add-stock-bar { display: none; background: #1a1d27; border-radius: 10px; padding: 16px; margin-bottom: 18px; border: 1px solid #2d3048; gap: 10px; align-items: center; }
.add-stock-bar.show { display: flex; }
.add-stock-bar input { flex: 1; padding: 8px 12px; border-radius: 6px; border: 1px solid #2d3048; background: #0f1117; color: #fff; font-size: 14px; }
.btn-add { padding: 8px 20px; border-radius: 6px; border: none; background: #00d4ff; color: #000; font-size: 13px; font-weight: bold; cursor: pointer; white-space: nowrap; }
.btn-edit { padding: 10px 18px; border-radius: 8px; border: 1px solid #aaa; background: transparent; color: #aaa; font-size: 14px; cursor: pointer; }
.btn-edit.active { border-color: #ff5252; color: #ff5252; }
.btn-secondary { padding: 10px 18px; border-radius: 8px; border: 1px solid #ce93d8; background: transparent; color: #ce93d8; font-size: 14px; cursor: pointer; }
.btn-secondary:hover { background: #2a1a3a; }

/* Stop-loss page */
.sl-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.sl-header h2 { font-size: 22px; color: #fff; }
.sl-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
.sl-card { background: #1a1d27; border-radius: 10px; padding: 18px; border: 1px solid #2d3048; }
.sl-card .sl-name { font-size: 16px; font-weight: bold; margin-bottom: 14px; }
.sl-card label { font-size: 13px; color: #888; display: block; margin-bottom: 4px; }
.sl-card input[type=number] { width: 100%; padding: 8px 10px; border-radius: 6px; border: 1px solid #2d3048; background: #0f1117; color: #fff; font-size: 14px; margin-bottom: 10px; }
.sl-card .sl-btns { display: flex; gap: 8px; margin-top: 4px; }
.btn-save { flex: 1; padding: 8px; border-radius: 6px; border: none; background: #ce93d8; color: #000; font-size: 13px; font-weight: bold; cursor: pointer; }
.btn-clear { padding: 8px 12px; border-radius: 6px; border: 1px solid #555; background: transparent; color: #888; font-size: 13px; cursor: pointer; }
.triggered { border-color: #ff5252 !important; }
.triggered .sl-name { color: #ff5252; }
.news-info { font-size: 12px; color: #666; margin-top: 4px; }

/* Win rate */
.winrate-summary { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 24px; }
table { width: 100%; border-collapse: collapse; background: #1a1d27; border-radius: 10px; overflow: hidden; }
th { background: #2d3048; padding: 14px 16px; text-align: left; font-size: 15px; color: #aaa; }
td { padding: 13px 16px; font-size: 15px; border-bottom: 1px solid #1f2235; }
tr:last-child td { border-bottom: none; }
.wr-bar { height: 6px; background: #2d3048; border-radius: 3px; margin-top: 4px; }
.wr-fill { height: 6px; border-radius: 3px; }

/* History */
.history-filter { display: flex; gap: 10px; margin-bottom: 16px; }
.history-filter select { padding: 8px 12px; background: #1a1d27; border: 1px solid #2d3048; color: #fff; border-radius: 6px; font-size: 14px; }
.badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; }
.badge.correct { background: #1a3a2a; color: #00e676; }
.badge.wrong { background: #3a1a1a; color: #ff5252; }
.badge.pending { background: #2a2a2a; color: #888; }
.badge.up { background: #1a3a2a; color: #00e676; }
.badge.down { background: #3a1a1a; color: #ff5252; }
</style>
</head>
<body>

<div class="header">
  <h1>台灣股票 AI 預測分析</h1>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('single')">單股分析</button>
    <button class="tab" onclick="switchTab('favorites')">我的最愛</button>
    <button class="tab" onclick="switchTab('stoploss')">停損提醒</button>
    <button class="tab" onclick="switchTab('winrate')">預測勝率</button>
    <button class="tab" onclick="switchTab('history')">預測記錄</button>
  </div>
</div>

<div class="container">

  <!-- 單股分析 -->
  <div class="page active" id="page-single">
    <div class="search-bar">
      <input type="text" id="stockInput" placeholder="輸入股票代碼，例如：2330（台積電）" />
      <button onclick="analyzeSingle()">分析</button>
    </div>
    <div class="error" id="errorBox"></div>
    <div class="loading" id="loading">AI 分析中，請稍候（約 30 秒）...</div>
    <div id="singleResults">
      <div class="summary">
        <div class="card"><div class="label">目前股價</div><div class="value" id="currentPrice">-</div></div>
        <div class="card"><div class="label">明日預測</div><div class="value" id="predPrice">-</div></div>
        <div class="card"><div class="label">趨勢判斷</div><div class="value" id="trend">-</div></div>
        <div class="card"><div class="label">AI 信心度</div><div class="value" id="confidenceBar">-</div></div>
        <div class="card"><div class="label">建議倉位</div><div class="value" id="positionLabel">-</div></div>
      </div>
      <div class="chart-box"><h3>股價走勢 + MA5/MA20 + AI 預測未來 5 天</h3><div id="priceChart"></div></div>
      <div class="chart-box"><h3>RSI 指標（>70 超買 / <30 超賣）</h3><div id="rsiChart"></div></div>
      <div class="chart-box"><h3>MACD 指標</h3><div id="macdChart"></div></div>
    </div>
  </div>

  <!-- 我的最愛 -->
  <div class="page" id="page-favorites">
    <div class="fav-header">
      <h2 id="favTitle">我的最愛</h2>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn-secondary" onclick="refreshNews(this)">更新新聞情緒</button>
        <button class="btn-edit" id="editBtn" onclick="toggleEdit()">編輯清單</button>
        <button class="btn-predict" id="predictBtn" onclick="runPredictions()">立即執行今日預測</button>
      </div>
    </div>
    <div class="add-stock-bar" id="addBar">
      <input type="text" id="addId" placeholder="輸入股票代碼（例如 2330）" onblur="lookupStock()" />
      <input type="text" id="addName" placeholder="名稱自動填入，或手動輸入" />
      <button class="btn-add" onclick="addStock()">新增</button>
    </div>
    <div class="loading" id="favLoading" style="display:none">執行 AI 預測中，約需數分鐘...</div>
    <div class="fav-grid" id="favGrid">載入中...</div>
  </div>

  <!-- 停損提醒 -->
  <div class="page" id="page-stoploss">
    <div class="sl-header">
      <h2>停損 / 目標價提醒</h2>
      <button class="btn-secondary" onclick="checkNow(this)">立即檢查現價</button>
    </div>
    <p style="color:#888;font-size:14px;margin-bottom:20px">每 30 分鐘自動檢查（交易日 9:00–14:00），觸發時 Telegram 通知</p>
    <div class="sl-grid" id="slGrid">載入中...</div>
  </div>

  <!-- 勝率統計 -->
  <div class="page" id="page-winrate">
    <div style="display:flex;justify-content:flex-end;margin-bottom:12px">
      <button onclick="refreshActuals()" id="btnRefreshActuals" style="padding:8px 16px;background:#2d3048;border:1px solid #3d4068;color:#fff;border-radius:6px;cursor:pointer">🔄 更新實際結果</button>
    </div>
    <div class="winrate-summary" id="wrSummary"></div>
    <div class="chart-box" style="margin-bottom:20px"><h3>各股票近一個月勝率</h3><div id="wrChart"></div></div>
    <table><thead><tr><th>股票</th><th>預測次數</th><th>已驗證</th><th>正確</th><th>勝率</th><th>勝率圖</th></tr></thead>
      <tbody id="wrBody"></tbody>
    </table>
  </div>

  <!-- 預測記錄 -->
  <div class="page" id="page-history">
    <div class="history-filter">
      <select id="historyFilter" onchange="loadHistory()"><option value="">全部股票</option></select>
    </div>
    <table>
      <thead><tr><th>日期</th><th>股票</th><th>當日收盤</th><th>預測價格</th><th>預測方向</th><th>實際收盤</th><th>實際方向</th><th>結果</th></tr></thead>
      <tbody id="historyBody"></tbody>
    </table>
  </div>

</div>

<script>
const layout = { paper_bgcolor: "#1a1d27", plot_bgcolor: "#1a1d27", font: { color: "#ccc" }, margin: { t: 10, b: 40 } };

function switchTab(name) {
  const names = ["single","favorites","stoploss","winrate","history"];
  document.querySelectorAll(".tab").forEach((t, i) => t.classList.toggle("active", names[i] === name));
  document.querySelectorAll(".page").forEach(p => p.classList.toggle("active", p.id === "page-" + name));
  if (name === "favorites") loadFavorites();
  if (name === "stoploss") loadStopLoss();
  if (name === "winrate") loadWinrate();
  if (name === "history") loadHistory();
}

// --- 單股分析 ---
async function analyzeSingle() {
  const stockId = document.getElementById("stockInput").value.trim();
  if (!stockId) return;
  document.getElementById("loading").style.display = "block";
  document.getElementById("singleResults").style.display = "none";
  document.getElementById("errorBox").style.display = "none";
  const res = await fetch("/analyze", { method: "POST", headers: {"Content-Type":"application/json"}, body: JSON.stringify({stock_id: stockId}) });
  const data = await res.json();
  document.getElementById("loading").style.display = "none";
  if (data.error) {
    document.getElementById("errorBox").textContent = "錯誤：" + data.error;
    document.getElementById("errorBox").style.display = "block";
    return;
  }
  document.getElementById("currentPrice").textContent = data.current_price;
  document.getElementById("predPrice").textContent = data.pred_price;
  const trendEl = document.getElementById("trend");
  trendEl.textContent = data.trend;
  const dir = data.direction || (data.trend.includes("↑") ? "up" : "down");
  trendEl.className = "value " + (dir === "up" ? "up" : dir === "down" ? "down" : "neutral");
  const conf = data.confidence != null ? data.confidence : null;
  const confEl = document.getElementById("confidenceBar");
  if (conf != null) {
    const pct = Math.round(conf * 100);
    const color = conf >= 0.65 ? "#00e676" : conf >= 0.55 ? "#ffd54f" : "#ff5252";
    confEl.innerHTML = `<span style="color:${color};font-size:1.2em;font-weight:bold">${pct}%</span>
      <div style="background:#2d3048;border-radius:4px;height:6px;margin-top:4px">
        <div style="width:${pct}%;background:${color};height:6px;border-radius:4px;transition:width .4s"></div>
      </div>`;
  } else {
    confEl.textContent = "-";
  }
  const posEl = document.getElementById("positionLabel");
  const posLabel = data.position_label || "-";
  const posRatio = data.position_ratio || 0;
  const posColor = posRatio >= 1.0 ? "#00e676" : posRatio >= 0.5 ? "#ffd54f" : posRatio > 0 ? "#ff8a65" : "#ff5252";
  const posReason = data.position_reason ? `<div style="font-size:0.7em;color:#aaa;margin-top:2px">${data.position_reason}</div>` : "";
  posEl.innerHTML = `<span style="color:${posColor};font-weight:bold">${posLabel}</span>${posReason}`;
  Plotly.newPlot("priceChart", [
    {x: data.dates, y: data.close, name: "收盤價", line: {color: "#00d4ff"}},
    {x: data.dates, y: data.ma5, name: "MA5", line: {color: "#ffd54f", dash: "dot"}},
    {x: data.dates, y: data.ma20, name: "MA20", line: {color: "#ff8a65", dash: "dot"}},
    {x: data.pred_dates, y: data.predictions, name: "AI預測", line: {color: "#00e676", dash: "dash"}, mode: "lines+markers"}
  ], {...layout, xaxis: {title:"日期"}, yaxis: {title:"股價 (TWD)"}});
  Plotly.newPlot("rsiChart", [
    {x: data.dates, y: data.rsi, name: "RSI", line: {color: "#ce93d8"}},
    {x: [data.dates[0], data.dates.at(-1)], y: [70,70], name: "超買", line: {color: "#ff5252", dash: "dot"}},
    {x: [data.dates[0], data.dates.at(-1)], y: [30,30], name: "超賣", line: {color: "#00e676", dash: "dot"}}
  ], {...layout, yaxis: {range: [0,100]}});
  Plotly.newPlot("macdChart", [
    {x: data.dates, y: data.macd, name: "MACD", line: {color: "#00d4ff"}},
    {x: data.dates, y: data.signal, name: "Signal", line: {color: "#ff8a65"}}
  ], layout);
  document.getElementById("singleResults").style.display = "block";
}

// --- 我的最愛 ---
let editMode = false;

function toggleEdit() {
  editMode = !editMode;
  const btn = document.getElementById("editBtn");
  const grid = document.getElementById("favGrid");
  btn.textContent = editMode ? "完成編輯" : "編輯清單";
  btn.classList.toggle("active", editMode);
  grid.classList.toggle("edit-mode", editMode);
  document.getElementById("addBar").classList.toggle("show", editMode);
}

async function lookupStock() {
  const id = document.getElementById("addId").value.trim();
  if (!id) return;
  const nameField = document.getElementById("addName");
  nameField.placeholder = "查詢中...";
  const res = await fetch(`/stock/lookup/${id}`);
  const data = await res.json();
  nameField.value = data.name || "";
  nameField.placeholder = data.name ? "名稱自動填入，或手動輸入" : "找不到，請手動輸入名稱";
}

async function addStock() {
  const id = document.getElementById("addId").value.trim();
  let name = document.getElementById("addName").value.trim();
  if (!id) return alert("請填入股票代碼");
  if (!name || name === id) {
    const r = await fetch(`/stock/lookup/${id}`);
    const d = await r.json();
    name = d.name || id;
  }
  const res = await fetch("/favorites/add", { method: "POST", headers: {"Content-Type":"application/json"}, body: JSON.stringify({id, name}) });
  const data = await res.json();
  if (data.error) return alert(data.error);
  document.getElementById("addId").value = "";
  document.getElementById("addName").value = "";
  loadFavorites();
}

async function removeStock(stockId) {
  if (!confirm(`確定刪除 ${stockId}？`)) return;
  await fetch(`/favorites/${stockId}`, {method: "DELETE"});
  loadFavorites();
}

async function refreshNews(btn) {
  btn.textContent = "更新中...";
  btn.disabled = true;
  await fetch("/news/refresh-all", {method: "POST"});
  btn.textContent = "更新新聞情緒";
  btn.disabled = false;
  loadFavorites();
}

async function loadFavorites() {
  const [stocks, history, winrate, stopLossData, newsAll] = await Promise.all([
    fetch("/favorites").then(r => r.json()),
    fetch("/history").then(r => r.json()),
    fetch("/winrate").then(r => r.json()),
    fetch("/stop-loss").then(r => r.json()),
    Promise.all([]).then(() => ({}))
  ]);

  document.getElementById("favTitle").textContent = `我的最愛（${stocks.length} 支）`;
  const grid = document.getElementById("favGrid");
  if (editMode) grid.classList.add("edit-mode");

  const wrMap = {};
  winrate.stats.forEach(s => wrMap[s.stock_id] = s);
  const todayStr = new Date().toISOString().slice(0,10);
  const todayPreds = {};
  history.filter(h => h.date === todayStr).forEach(h => todayPreds[h.stock_id] = h);

  // Load news from cache concurrently
  const newsResults = {};
  await Promise.all(stocks.map(async s => {
    try {
      const r = await fetch(`/news/${s.id}`);
      newsResults[s.id] = await r.json();
    } catch { newsResults[s.id] = null; }
  }));

  grid.innerHTML = stocks.map(s => {
    const pred = todayPreds[s.id];
    const wr = wrMap[s.id];
    const sl = stopLossData[s.id];
    const news = newsResults[s.id];

    let predHtml = `<span class="pred pending">尚無預測</span>`;
    if (pred) {
      const cls = pred.predicted_direction === "up" ? "up" : "down";
      predHtml = `<span class="pred ${cls}">${cls==="up"?"↑":"↓"} ${pred.predicted_price}</span>`;
    }
    let wrHtml = `<span class="winbadge neutral">無記錄</span>`;
    if (wr?.winrate !== null && wr?.winrate !== undefined) {
      const cls = wr.winrate >= 55 ? "good" : wr.winrate <= 45 ? "bad" : "neutral";
      wrHtml = `<span class="winbadge ${cls}">勝率 ${wr.winrate}%（${wr.correct}/${wr.judged}）</span>`;
    }
    let newsHtml = "";
    if (news?.label) {
      const cls = news.label === "正面" ? "pos" : news.label === "負面" ? "neg" : "neu";
      const icon = news.label === "正面" ? "📰+" : news.label === "負面" ? "📰-" : "📰";
      newsHtml = `<span class="sentiment-badge ${cls}">${icon} 新聞${news.label}</span>`;
    }
    let slHtml = "";
    if (sl?.stop_price || sl?.target_price) {
      const parts = [];
      if (sl.stop_price) parts.push(`停損 ${sl.stop_price}`);
      if (sl.target_price) parts.push(`目標 ${sl.target_price}`);
      const triggered = sl.stop_triggered || sl.target_triggered;
      slHtml = `<span class="stop-badge" style="${triggered ? "background:#3a1a1a;color:#ff5252" : ""}">🔔 ${parts.join(" | ")}</span>`;
    }

    return `<div class="fav-card">
      <div class="sname">${s.name}</div>
      <div class="sid">${s.id}</div>
      <div class="price-row"><span style="color:#888">今日預測</span>${predHtml}</div>
      ${wrHtml}${newsHtml ? "<br>" + newsHtml : ""}${slHtml ? "<br>" + slHtml : ""}
      <button class="del-btn" onclick="removeStock('${s.id}')">刪除</button>
    </div>`;
  }).join("");
}

async function runPredictions() {
  const btn = document.getElementById("predictBtn");
  btn.disabled = true; btn.textContent = "預測執行中...";
  document.getElementById("favLoading").style.display = "block";
  await fetch("/favorites/predict-now", {method: "POST"});
  document.getElementById("favLoading").style.display = "none";
  btn.disabled = false; btn.textContent = "立即執行今日預測";
  loadFavorites();
}

// --- 停損提醒 ---
let _slStocks = [];

async function loadStopLoss() {
  const grid = document.getElementById("slGrid");
  grid.innerHTML = "載入中...";
  try {
    const [stocks, slData] = await Promise.all([
      fetch("/favorites").then(r => r.json()),
      fetch("/stop-loss").then(r => r.json())
    ]);
    _slStocks = stocks;
    grid.innerHTML = stocks.length === 0
      ? "<p style='color:#888'>尚無自選股</p>"
      : stocks.map(s => {
          const sl = slData[s.id] || {};
          const triggered = sl.stop_triggered || sl.target_triggered;
          return `<div class="sl-card ${triggered ? "triggered" : ""}" data-id="${s.id}" data-name="${s.name}">
            <div class="sl-name">${s.name} <span style="font-size:12px;color:#555;font-weight:normal">${s.id}</span>${triggered ? " 🚨" : ""}</div>
            <label>停損價（跌破時通知）</label>
            <input type="number" class="sl-stop" placeholder="例如 850" step="0.5" value="${sl.stop_price || ""}">
            <label>目標價（達到時通知）</label>
            <input type="number" class="sl-target" placeholder="例如 1000" step="0.5" value="${sl.target_price || ""}">
            <div class="sl-btns">
              <button class="btn-save" data-action="save">儲存</button>
              <button class="btn-clear" data-action="clear">清除</button>
            </div>
          </div>`;
        }).join("");
  } catch(e) {
    grid.innerHTML = `<p style="color:#ff5252">載入失敗：${e.message}</p>`;
  }
}

// event delegation — 一個監聽器處理所有卡片的按鈕
document.addEventListener("DOMContentLoaded", () => {
  document.getElementById("slGrid").addEventListener("click", async e => {
    const action = e.target.dataset.action;
    if (!action) return;
    const card = e.target.closest(".sl-card");
    if (!card) return;
    const stockId   = card.dataset.id;
    const stockName = card.dataset.name;
    const btn = e.target;

    if (action === "save") {
      const stopPrice   = parseFloat(card.querySelector(".sl-stop").value)   || null;
      const targetPrice = parseFloat(card.querySelector(".sl-target").value) || null;
      btn.textContent = "儲存中..."; btn.disabled = true;
      try {
        const res = await fetch("/stop-loss", {
          method: "POST",
          headers: {"Content-Type":"application/json"},
          body: JSON.stringify({stock_id: stockId, stock_name: stockName, stop_price: stopPrice, target_price: targetPrice})
        });
        if (!res.ok) throw new Error(res.status);
        btn.textContent = "✓ 已儲存";
        setTimeout(() => { btn.textContent = "儲存"; btn.disabled = false; }, 1500);
      } catch(err) {
        btn.textContent = "❌ 失敗";
        setTimeout(() => { btn.textContent = "儲存"; btn.disabled = false; }, 2000);
      }
    }

    if (action === "clear") {
      btn.textContent = "清除中..."; btn.disabled = true;
      try {
        await fetch(`/stop-loss/${stockId}`, {method: "DELETE"});
        await loadStopLoss();
      } catch(err) {
        btn.textContent = "❌ 失敗";
        setTimeout(() => { btn.textContent = "清除"; btn.disabled = false; }, 2000);
      }
    }
  });
});

async function checkNow(btn) {
  btn.textContent = "檢查中..."; btn.disabled = true;
  try {
    await fetch("/stop-loss/check-now", {method: "POST"});
    btn.textContent = "✓ 完成";
    setTimeout(() => { btn.textContent = "立即檢查現價"; btn.disabled = false; }, 1500);
  } catch(e) {
    btn.textContent = "❌ 失敗";
    setTimeout(() => { btn.textContent = "立即檢查現價"; btn.disabled = false; }, 2000);
  }
  loadStopLoss();
}

async function refreshActuals() {
  const btn = document.getElementById("btnRefreshActuals");
  btn.textContent = "更新中..."; btn.disabled = true;
  await fetch("/update-actuals", {method: "POST"});
  await new Promise(r => setTimeout(r, 3000));
  await loadWinrate();
  btn.textContent = "🔄 更新實際結果"; btn.disabled = false;
}

// --- 勝率 ---
async function loadWinrate() {
  const data = await fetch("/winrate").then(r => r.json());
  const overall = data.overall;
  document.getElementById("wrSummary").innerHTML = `
    <div class="card"><div class="label">總預測次數</div><div class="value">${overall.total}</div></div>
    <div class="card"><div class="label">已驗證次數</div><div class="value">${overall.judged}</div></div>
    <div class="card"><div class="label">預測正確</div><div class="value up">${overall.correct}</div></div>
    <div class="card"><div class="label">整體勝率</div><div class="value ${(overall.winrate||0) >= 50 ? 'up' : 'down'}">${overall.winrate !== null ? overall.winrate + "%" : "計算中"}</div></div>`;
  const stats = data.stats.filter(s => s.judged > 0);
  Plotly.newPlot("wrChart", [{
    x: stats.map(s => s.stock_name), y: stats.map(s => s.winrate), type: "bar",
    marker: { color: stats.map(s => s.winrate >= 50 ? "#00e676" : "#ff5252") },
    text: stats.map(s => s.winrate + "%"), textposition: "outside"
  }], { ...layout, yaxis: { range: [0, 100], title: "勝率 (%)" },
    shapes: [{type:"line", x0:-0.5, x1:stats.length-0.5, y0:50, y1:50, line:{color:"#ffd54f",dash:"dot"}}] });
  document.getElementById("wrBody").innerHTML = data.stats.map(s => {
    const wr = s.winrate;
    const color = wr === null ? "#888" : wr >= 55 ? "#00e676" : wr >= 45 ? "#ffd54f" : "#ff5252";
    return `<tr>
      <td><strong>${s.stock_name}</strong><br><span style="color:#555;font-size:12px">${s.stock_id}</span></td>
      <td>${s.total}</td><td>${s.judged}</td>
      <td style="color:#00e676">${s.correct}</td>
      <td style="color:${color};font-weight:bold">${wr !== null ? wr + "%" : "計算中"}</td>
      <td style="width:120px"><div class="wr-bar"><div class="wr-fill" style="width:${wr||0}%;background:${color}"></div></div></td>
    </tr>`;
  }).join("");
}

// --- 歷史記錄 ---
async function loadHistory() {
  const data = await fetch("/history").then(r => r.json());
  const sel = document.getElementById("historyFilter");
  const current = sel.value;
  const ids = [...new Set(data.map(d => d.stock_id))];
  sel.innerHTML = `<option value="">全部股票</option>` + ids.map(id => {
    const name = data.find(d => d.stock_id === id)?.stock_name || id;
    return `<option value="${id}" ${id === current ? "selected" : ""}>${name}（${id}）</option>`;
  }).join("");
  const filtered = current ? data.filter(d => d.stock_id === current) : data;
  document.getElementById("historyBody").innerHTML = filtered.map(r => {
    const resultBadge = r.is_correct === null ? `<span class="badge pending">待驗證</span>`
      : r.is_correct ? `<span class="badge correct">✓ 正確</span>` : `<span class="badge wrong">✗ 錯誤</span>`;
    return `<tr>
      <td>${r.date}</td>
      <td><strong>${r.stock_name}</strong><br><span style="color:#555;font-size:12px">${r.stock_id}</span></td>
      <td>${r.current_price ?? "-"}</td><td>${r.predicted_price ?? "-"}</td>
      <td><span class="badge ${r.predicted_direction}">${r.predicted_direction === "up" ? "↑ 看漲" : "↓ 看跌"}</span></td>
      <td>${r.actual_price ?? "-"}</td>
      <td>${r.actual_direction ? `<span class="badge ${r.actual_direction}">${r.actual_direction === "up" ? "↑ 漲" : "↓ 跌"}</span>` : "-"}</td>
      <td>${resultBadge}</td>
    </tr>`;
  }).join("");
}

document.getElementById("stockInput").addEventListener("keydown", e => { if (e.key === "Enter") analyzeSingle(); });
